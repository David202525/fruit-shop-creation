server {
    listen 80;
    server_name siberian-florarium.ru www.siberian-florarium.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name siberian-florarium.ru www.siberian-florarium.ru;

    # SSL сертификаты (после certbot)
    ssl_certificate /etc/letsencrypt/live/siberian-florarium.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siberian-florarium.ru/privkey.pem;

    # Фронтенд (билд из /var/www/html)
    root /var/www/html;
    index index.html;

    client_max_body_size 50M;

    # API → FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
